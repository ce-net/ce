# Example: a CE-native mesh app shipped as a per-platform native binary.
# The install COMMAND is identical on every host; `ce` resolves the right artifact.
#   ce app install rdev --yes

[app]
name    = "rdev"
version = "0.4.1"
summary = "Remote exec + content-addressed sync over the mesh"
runtime = "native"
publisher = "c0be11e0ce0aaa769da6f9970244947d3d32a0c0d8302fb5f41f73d7950be456"

[native]
bin = "rdev"
# Content-addressed; ce picks the host's (os, arch) entry.
artifacts."darwin-arm64" = "blake3:PLACEHOLDER_darwin_arm64"
artifacts."linux-amd64"  = "blake3:PLACEHOLDER_linux_amd64"
artifacts."linux-arm64"  = "blake3:PLACEHOLDER_linux_arm64"

[deps]
capabilities = ["exec", "sync", "tunnel"]
system = { docker = "optional" }

[sandbox]
tier       = "runc"        # native mesh app needs host/libp2p access, not gVisor
net        = "mesh-only"
capability = "scoped"
